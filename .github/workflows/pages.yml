name: pages
on:
  push:
    branches: [main]
    paths:
      - "site/**"
      - "data/data.json"
      - ".github/workflows/pages.yml"
  # GITHUB_TOKEN pushes don't fire `on: push`, so update.yml's bot commits
  # never trigger this. workflow_run catches them regardless of pusher.
  workflow_run:
    workflows: ["update"]
    types: [completed]
    branches: [main]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: pages
  cancel-in-progress: true
jobs:
  build:
    runs-on: ubuntu-latest
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    steps:
      - uses: actions/checkout@v4
      - name: stage site
        run: |
          mkdir -p _site _site/data
          cp -r site/. _site/
          cp data/data.json _site/data.json
          cp -r data/daily _site/data/daily
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
